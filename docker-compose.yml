services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: letter-mcp-web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - static_volume:/app/staticfiles
    networks:
      - letter_mcp_net

  db:
    image: postgres:16-alpine
    container_name: letter-mcp-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-lettermcp}
      POSTGRES_USER: ${DB_USER:-lettermcp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lettermcp} -d ${DB_NAME:-lettermcp}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - letter_mcp_net

  backup:
    image: python:3.12-alpine
    container_name: letter-mcp-backup
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "/scripts/backup-entrypoint.sh"]
    networks:
      - letter_mcp_net

volumes:
  postgres_data:
  static_volume:

networks:
  letter_mcp_net:
    driver: bridge
